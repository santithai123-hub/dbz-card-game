<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ RPG Card Game - v1</title>
<style>
  /* --- GLOBAL STYLES --- */
  body {
    background-color: #1a1a1a;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  h2, h3 { margin: 10px 0; }
  
  /* Version Watermark */
  #version-tag {
    position: fixed;
    top: 10px;
    right: 10px;
    background-color: #444;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: bold;
    color: #ffaa00;
  }

  /* --- RPG MAP ARENA --- */
  #map-arena {
    background-color: #222;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  }

  #board-track {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    padding: 15px;
    background-color: #111;
    border-radius: 10px;
    overflow-x: auto;
  }

  .map-tile {
    min-width: 50px;
    height: 50px;
    background-color: #3a3a3a;
    border: 2px solid #555;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    position: relative;
  }

  .tile-start { background-color: #2e7d32; border-color: #4caf50; } 
  .tile-boss { background-color: #c62828; border-color: #ef5350; }  
  .tile-encounter { border-color: #ff9800; background-color: #4e342e; } 

  .player-token {
    position: absolute;
    font-size: 32px;
    text-shadow: 0 0 5px #fff;
    animation: bounce 0.6s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0px); }
    to { transform: translateY(-8px); }
  }

  /* --- COMBAT ARENA --- */
  #combat-arena {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #2a2a2a;
    border: 3px solid #ffaa00;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  }

  .fighter-stats {
    width: 100%;
    text-align: center;
  }

  .health-bar-container {
    width: 100%;
    height: 25px;
    background-color: #555;
    border: 3px solid #111;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 5px;
  }

  .health-fill {
    height: 100%;
    width: 100%;
    transition: width 0.4s ease-in-out;
  }
  .player-color { background-color: #32cd32; }
  .enemy-color { background-color: #dc143c; }

  /* --- CLASH ZONE --- */
  #clash-zone {
    display: flex;
    align-items: center;
    gap: 30px;
    margin: 20px 0;
  }

  .card-slot {
    width: 120px;
    height: 180px;
    border: 2px dashed #777;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #111;
  }

  .vs-text {
    font-size: 32px;
    font-weight: bold;
    color: #ffaa00;
    text-shadow: 2px 2px #000;
  }

  .placeholder-text { color: #555; font-weight: bold; }

  /* --- PLAYER HAND --- */
  .hand-container {
    display: flex;
    gap: 15px;
    padding: 20px;
    background-color: #222;
    border-radius: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 800px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  /* --- THE CARDS --- */
  .card {
    width: 120px;
    height: 180px;
    background-color: #fdfdfd;
    border: 3px solid #444;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.2s ease-in-out, border-color 0.2s;
    user-select: none;
  }

  .card:hover {
    transform: translateY(-15px);
    border-color: #ff9900;
  }

  .power {
    position: absolute;
    top: 8px;
    left: 8px;
    background-color: #ffaa00;
    color: #fff;
    border: 2px solid #cc2200;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .guard {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background-color: #add8e6;
    color: #000;
    border: 2px solid #00008b;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
  }

  .action {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
  }

  /* --- UTILITIES & OVERLAYS --- */
  .hidden { display: none !important; }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background-color: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .end-modal {
    background-color: #222;
    border: 4px solid #ffaa00;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    max-width: 400px;
  }

  #end-title { font-size: 48px; margin-bottom: 10px; }
  
  #restart-button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 20px;
    font-weight: bold;
    background-color: #ffaa00;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  #restart-button:hover { background-color: #cc8800; }
</style>
</head>
<body>

  <div id="version-tag">Version: 1</div>

  <div id="map-arena">
    <h2>Story Route: The Saiyan Arrival</h2>
    <p style="color: #aaa;">Click a card below to move that many spaces!</p>
    <div id="board-track">
      </div>
  </div>

  <div id="combat-arena" class="hidden">
    <div class="fighter-stats">
      <h3 id="enemy-name">Saibaman</h3>
      <div class="health-bar-container">
        <div id="enemy-health-fill" class="health-fill enemy-color"></div>
      </div>
      <p>HP: <span id="enemy-hp-text">40 / 40</span></p>
    </div>

    <div id="clash-zone">
      <div id="player-active-card" class="card-slot">
        <p class="placeholder-text">Your Card</p>
      </div>
      <div class="vs-text">VS</div>
      <div id="enemy-active-card" class="card-slot">
        <p class="placeholder-text">Enemy Card</p>
      </div>
    </div>

    <div class="fighter-stats">
      <h3>Goku (Player)</h3>
      <div class="health-bar-container">
        <div id="player-health-fill" class="health-fill player-color"></div>
      </div>
      <p>HP: <span id="player-hp-text">100 / 100</span></p>
    </div>
  </div>

  <h2>Your Hand</h2>
  <div id="player-hand" class="hand-container">
    </div>

  <div id="end-screen" class="overlay hidden">
    <div class="end-modal">
      <h1 id="end-title">GAME OVER</h1>
      <p id="end-message">Raditz has defeated you.</p>
      <button id="restart-button" onclick="restartGame()">Play Again</button>
    </div>
  </div>

<script>
  // --- VERSION MARKER ---
  const GAME_VERSION = 1;
  console.log(`%c DBZ Card RPG Loaded - Running Version ${GAME_VERSION} `, "background: #ffaa00; color: #000; font-weight: bold;");

  const ACTION_ICONS = {
    'melee': '👊',
    'ki_blast': '💥',
    'defend': '🛡️',
    'recover': '💊',
    'special': '✨'
  };

  class Card {
    constructor(id, power, guard, actionType) {
      this.id = id; 
      this.power = power; 
      this.guard = guard; 
      this.actionType = actionType; 
    }
    get displayPower() { return this.power === 8 ? 'Z' : this.power.toString(); }
    get displayGuard() { return this.guard === 8 ? 'Z' : this.guard.toString(); }
  }

  // --- GAME SYSTEM STATE ---
  let gameState = 'MAP'; // 'MAP' or 'COMBAT'
  let playerPosition = 0;
  let playerStats = { hp: 100, maxHp: 100 };
  let enemyStats = { hp: 40, maxHp: 40, name: "Saibaman" };
  let playerDeck = [];
  let playerHand = [];

  // THE RPG ROADMAP
  const storyMap = [
    { type: 'start' },
    { type: 'empty' },
    { type: 'encounter' },
    { type: 'empty' },
    { type: 'encounter' },
    { type: 'empty' },
    { type: 'encounter' },
    { type: 'empty' },
    { type: 'empty' },
    { type: 'boss' } // Boss is at the 10th tile (index 9)
  ];

  // --- DECK MANAGEMENT ---
  function generateDeck() {
    let deck = [];
    let cardCounter = 1;
    const actionDistribution = { 'melee': 15, 'ki_blast': 10, 'defend': 8, 'recover': 5, 'special': 2 };
    const rollStat = () => Math.floor(Math.random() * 8) + 1;

    for (const [actionType, count] of Object.entries(actionDistribution)) {
      for (let i = 0; i < count; i++) {
        let id = `DBZ-${cardCounter.toString().padStart(3, '0')}`; 
        deck.push(new Card(id, rollStat(), rollStat(), actionType));
        cardCounter++;
      }
    }
    return shuffleDeck(deck);
  }

  function shuffleDeck(deckArray) {
    for (let i = deckArray.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deckArray[i], deckArray[j]] = [deckArray[j], deckArray[i]]; 
    }
    return deckArray;
  }

  function dealInitialHand() {
    for (let i = 0; i < 5; i++) { playerHand.push(playerDeck.pop()); }
    renderHand();
  }

  // --- UI ENGINE ---
  function renderMap() {
    const track = document.getElementById('board-track');
    track.innerHTML = ''; 

    storyMap.forEach((tile, index) => {
      let tileDiv = document.createElement('div');
      tileDiv.className = `map-tile tile-${tile.type}`;
      
      if (index === playerPosition) {
        tileDiv.innerHTML = `<div class="player-token">🐉</div>`;
      } else if (tile.type === 'boss') {
        tileDiv.innerHTML = `👹`; 
      } else if (tile.type === 'start') {
        tileDiv.innerHTML = `🏠`; 
      } else if (tile.type === 'encounter') {
        tileDiv.innerHTML = `❗`;
      }
      
      track.appendChild(tileDiv);
    });
  }

  function renderHand() {
    const handContainer = document.getElementById('player-hand');
    handContainer.innerHTML = ''; 

    playerHand.forEach(card => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'card';
      cardDiv.id = card.id; 
      cardDiv.innerHTML = `
        <div class="power">${card.displayPower}</div>
        <div class="action">${ACTION_ICONS[card.actionType]}</div>
        <div class="guard">${card.displayGuard}</div>
      `;
      
      // CONTEXT AWARE CLICK LISTENER
      cardDiv.addEventListener('click', () => {
        if (gameState === 'MAP') {
          movePlayerOnMap(card);
        } else if (gameState === 'COMBAT') {
          playCard(card);
        }
      });
      handContainer.appendChild(cardDiv);
    });
  }

  function updateUI(playerCard, enemyCard) {
    const playerHpPercent = Math.max(0, (playerStats.hp / playerStats.maxHp) * 100);
    const enemyHpPercent = Math.max(0, (enemyStats.hp / enemyStats.maxHp) * 100);

    document.getElementById('player-health-fill').style.width = `${playerHpPercent}%`;
    document.getElementById('enemy-health-fill').style.width = `${enemyHpPercent}%`;
    document.getElementById('player-hp-text').innerText = `${playerStats.hp} / ${playerStats.maxHp}`;
    document.getElementById('enemy-hp-text').innerText = `${enemyStats.hp} / ${enemyStats.maxHp}`;

    if (playerCard && enemyCard && playerCard.power !== '?') {
      document.getElementById('player-active-card').innerHTML = `
        <div class="card" style="margin: 0; cursor: default;">
          <div class="power">${playerCard.power === 8 ? 'Z' : playerCard.power}</div>
          <div class="action">${ACTION_ICONS[playerCard.actionType]}</div>
          <div class="guard">${playerCard.guard === 8 ? 'Z' : playerCard.guard}</div>
        </div>
      `;
      document.getElementById('enemy-active-card').innerHTML = `
        <div class="card" style="margin: 0; cursor: default; border-color: #dc143c;">
          <div class="power">${enemyCard.power === 8 ? 'Z' : enemyCard.power}</div>
          <div class="action">${ACTION_ICONS[enemyCard.actionType]}</div>
          <div class="guard">${enemyCard.guard === 8 ? 'Z' : enemyCard.guard}</div>
        </div>
      `;
    }
  }

  // --- RPG NAVIGATION LOOP ---
  function movePlayerOnMap(card) {
    let spacesToMove = card.power;
    playerPosition += spacesToMove;

    if (playerPosition >= storyMap.length - 1) {
      playerPosition = storyMap.length - 1; 
    }

    renderMap();
    let currentTile = storyMap[playerPosition];
    
    if (currentTile.type === 'encounter') {
      startCombat("Saibaman", 45); 
    } else if (currentTile.type === 'boss') {
      startCombat("Raditz", 140); 
    }

    replaceUsedCard(card);
  }

  // --- SCENE TRANSITIONS ---
  function startCombat(enemyName, enemyMaxHp) {
    gameState = 'COMBAT';
    enemyStats = { name: enemyName, hp: enemyMaxHp, maxHp: enemyMaxHp };
    
    document.getElementById('enemy-name').innerText = enemyName;
    document.getElementById('map-arena').classList.add('hidden');
    document.getElementById('combat-arena').classList.remove('hidden');

    document.getElementById('player-active-card').innerHTML = '<p class="placeholder-text">Your Card</p>';
    document.getElementById('enemy-active-card').innerHTML = '<p class="placeholder-text">Enemy Card</p>';
    updateUI({power: '?'}, {power: '?'});
  }

  function endCombat() {
    gameState = 'MAP';
    // Heal player slightly for survival reward
    playerStats.hp = Math.min(playerStats.maxHp, playerStats.hp + 25);
    
    document.getElementById('combat-arena').classList.add('hidden');
    document.getElementById('map-arena').classList.remove('hidden');
    updateUI({power: '?'}, {power: '?'});
  }

  // --- COMBAT ENGINE ---
  function playCard(playerCard) {
    let enemyCard = new Card("ENEMY-CARD", Math.floor(Math.random() * 8) + 1, Math.floor(Math.random() * 8) + 1, 'melee');

    if (playerCard.power > enemyCard.power) {
      let damage = Math.max(1, playerCard.power - enemyCard.guard);
      enemyStats.hp -= damage;
    } else if (enemyCard.power > playerCard.power) {
      let damage = Math.max(1, enemyCard.power - playerCard.guard);
      playerStats.hp -= damage;
    }

    updateUI(playerCard, enemyCard);

    if (!checkWinCondition()) {
      replaceUsedCard(playerCard);
    }
  }

  function replaceUsedCard(usedCard) {
    playerHand = playerHand.filter(card => card.id !== usedCard.id);
    if (playerDeck.length > 0) {
      playerHand.push(playerDeck.pop());
    } else {
      playerDeck = generateDeck(); 
      playerHand.push(playerDeck.pop());
    }
    renderHand();
  }

  // --- WIN/LOSS STATES ---
  function checkWinCondition() {
    if (playerStats.hp <= 0) {
      playerStats.hp = 0;
      showEndScreen(false);
      return true;
    }
    if (enemyStats.hp <= 0) {
      enemyStats.hp = 0;
      if (storyMap[playerPosition].type === 'boss') {
        showEndScreen(true);
      } else {
        endCombat();
      }
      return true;
    }
    return false;
  }

  function showEndScreen(isVictory) {
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const endMessage = document.getElementById('end-message');

    if (isVictory) {
      endTitle.innerText = "VICTORY!";
      endTitle.style.color = "#32cd32";
      endMessage.innerText = "You defeated Raditz and saved the Earth from the Saiyan threat!";
    } else {
      endTitle.innerText = "GAME OVER";
      endTitle.style.color = "#dc143c";
      endMessage.innerText = "Goku fell in battle. The Earth has been devastated.";
    }
    endScreen.classList.remove('hidden');
  }

  function restartGame() {
    gameState = 'MAP';
    playerPosition = 0;
    playerStats.hp = playerStats.maxHp;
    
    document.getElementById('end-screen').classList.add('hidden');
    document.getElementById('combat-arena').classList.add('hidden');
    document.getElementById('map-arena').classList.remove('hidden');
    
    document.getElementById('player-active-card').innerHTML = '<p class="placeholder-text">Your Card</p>';
    document.getElementById('enemy-active-card').innerHTML = '<p class="placeholder-text">Enemy Card</p>';

    renderMap();
    updateUI({power: '?'}, {power: '?'});

    playerDeck = generateDeck();
    playerHand = [];
    dealInitialHand();
  }

  // START GAME AT v1
  restartGame();
</script>
</body>
</html>
